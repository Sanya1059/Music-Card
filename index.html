<div id="music-card" style="
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 15px;
    margin-top: 20px;
    display: none; /* Спочатку прихований, поки не завантажиться пісня */
    align-items: center;
    border: 1px solid rgba(255, 255, 255, 0.2);
">
    <img id="track-art" src="" style="width: 50px; height: 50px; border-radius: 8px; margin-right: 15px;">
    <div style="text-align: left;">
        <p id="track-status" style="font-size: 10px; margin: 0; opacity: 0.7; text-transform: uppercase; color: white;">Зараз слухаю</p>
        <p id="track-name" style="font-size: 14px; margin: 3px 0; font-weight: bold; color: white;"></p>
        <p id="track-artist" style="font-size: 12px; margin: 0; opacity: 0.8; color: white;"></p>
    </div>
</div>

<script>
const LASTFM_USER = 'Sanya1059'; // Впиши свій нік на Last.fm
const API_KEY = '50e49a7fecb6f701da3880ce4096c25a';     // Впиши свій API Key

async function updateMusic() {
    try {
        const response = await fetch(`https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${LASTFM_USER}&api_key=${API_KEY}&format=json&limit=1`);
        const data = await response.json();
        const track = data.recenttracks.track[0];

        if (track) {
            document.getElementById('track-name').innerText = track.name;
            document.getElementById('track-artist').innerText = track.artist['#text'];
            document.getElementById('track-art').src = track.image[2]['#text'] || 'https://via.placeholder.com/50';
            
            // Якщо пісня зараз грає — пишемо "Зараз", якщо ні — "Останній трек"
            const isPlaying = track['@attr'] && track['@attr'].nowplaying === 'true';
            document.getElementById('track-status').innerText = isPlaying ? "Зараз слухаю" : "Останній трек";
            
            document.getElementById('music-card').style.display = 'flex';
        }
    } catch (error) {
        console.log("Помилка музики:", error);
    }
}

// Оновлюємо кожні 30 секунд
updateMusic();
setInterval(updateMusic, 30000);
</script>
