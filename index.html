<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanya1059</title>
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
    <div class="card">
        <p class="card-title">LAST.FM MONITOR</p>

        <!-- Музична картка -->
        <div id="music-card" class="music-card">
            <div class="music-card-info">
                <p id="track-status" class="track-status">Зараз слухаю</p>
                <p id="track-name" class="track-name"></p>
                <p id="track-artist" class="track-artist"></p>
            </div>
        </div>

        <div id="recent-section" class="recent-section">
            <p class="recent-title">Нещодавно прослухані</p>
            <div id="recent-tracks"></div>
        </div>

        <div id="live-section" class="live-section">
            <p class="recent-title">Live за сьогодні</p>
            <div id="live-timeline" class="live-timeline"></div>
            <p id="live-summary" class="live-summary">Немає активності за сьогодні</p>
        </div>

        <div id="tracking-panel" class="youtube-panel">
            <p class="recent-title">Джерела відстеження</p>
            <p id="tracking-status" class="youtube-status">1 джерело (базове)</p>
            <p id="tracking-hint" class="youtube-hint">Додай ще джерело, якщо в Pano Scrobbler увімкнув додатковий трекінг.</p>
            <div class="tracking-controls">
                <button id="source-dec" class="tracking-button" type="button">-1</button>
                <button id="source-inc" class="tracking-button" type="button">+1 джерело</button>
            </div>
        </div>

        <div id="extra-source-window" class="extra-source-window">
            <p class="recent-title">Додаткове вікно джерела</p>
            <p id="extra-source-text" class="youtube-hint">Активовано розширений моніторинг для додаткового джерела.</p>
        </div>

    </div>
    <script src="script.js?v=4"></script>
</body>
</html>
